name: Daily Sports Update

on:
  schedule:
    - cron: '0 9 * * *'  # 4 AM CDT (UTC-5) = 9 AM UTC
  workflow_dispatch:       # allows manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install nba_api pandas numpy requests

      - name: Run NBA update
        run: python update.py
        working-directory: nba-importance

      - name: Run MLB update
        run: python update.py
        working-directory: mlb-newspaper

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nba-importance/index.html mlb-newspaper/index.html mlb-newspaper/mlb_cache.json
          git diff --cached --quiet || git commit -m "chore: daily sports update $(date -u '+%Y-%m-%d')"
          git push
